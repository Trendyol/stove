"label": |-
  Docker image (container mode)
"gradle":
- |-
  com.trendyol:stove-container
"imports":
- |-
  com.trendyol.stove.container.containerApp
- |-
  com.trendyol.stove.container.ContainerTarget
- |-
  com.trendyol.stove.system.ReadinessStrategy
"runner": |-
  containerApp(
    image = "ghcr.io/your-org/your-app:latest",
    target = ContainerTarget.Server(
      hostPort = 8080,
      internalPort = 8080,
      portEnvVar = "PORT",
      readiness = ReadinessStrategy.HttpGet(url = "http://localhost:8080/health")
    )
  )
