"label": |-
  Redis
"family": |-
  database
"gradle":
- |-
  com.trendyol:stove-redis
"imports":
- |-
  com.trendyol.stove.redis.*
"configure": |-
  redis {
    RedisSystemOptions(
      configureExposedConfiguration = { cfg ->
        listOf("spring.data.redis.url=${cfg.url}")
      }
    )
  }
"testDsl": |-
  redis {
    client().connect().sync().get("order:1") shouldNotBe null
  }
"configureProvided": |-
  redis {
    RedisOptions.provided(
      url = "redis://staging-redis:6379",
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
