"label": |-
  Elasticsearch
"family": |-
  database
"gradle":
- |-
  com.trendyol:stove-elasticsearch
"imports":
- |-
  com.trendyol.stove.elasticsearch.*
"configure": |-
  elasticsearch {
    ElasticsearchSystemOptions(
      configureExposedConfiguration = { cfg ->
        listOf("elasticsearch.url=${cfg.url}")
      }
    )
  }
"testDsl": |-
  elasticsearch {
    shouldGet<MyDoc>(index = "orders", key = "id") {
      it.field shouldBe "x"
    }
  }
"configureProvided": |-
  elasticsearch {
    ElasticsearchSystemOptions.provided(
      url = "http://staging-es:9200",
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
