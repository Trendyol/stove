"label": |-
  Kafka
"family": |-
  messaging
"gradle":
- |-
  com.trendyol:stove-kafka
"imports":
- |-
  com.trendyol.stove.kafka.*
- |-
  com.trendyol.stove.serialization.StoveSerde
- |-
  kotlin.time.Duration.Companion.seconds
"configure": |-
  kafka {
    KafkaSystemOptions(
      serde = StoveSerde.jackson.anyByteArraySerde(),
      configureExposedConfiguration = { cfg ->
        listOf(
          "spring.kafka.bootstrap-servers=${cfg.bootstrapServers}",
          "spring.kafka.producer.properties.interceptor.classes=${cfg.interceptorClass}",
          "spring.kafka.consumer.properties.interceptor.classes=${cfg.interceptorClass}"
        )
      }
    )
  }
"testDsl": |-
  kafka {
    shouldBePublished<Map<String, Any>> {
      actual["type"] == "created"
    }
  }
"configureProvided": |-
  kafka {
    KafkaSystemOptions.provided(
      bootstrapServers = "staging-kafka:9092",
      cleanup = { admin ->
        // Optional: delete only your test-prefixed topics
        admin.listTopics().names().get()
          .filter { it.startsWith("test_${TestRunContext.runId}_") }
          .takeIf { it.isNotEmpty() }
          ?.let { admin.deleteTopics(it).all().get() }
      },
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
