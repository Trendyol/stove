"label": |-
  Couchbase
"family": |-
  database
"gradle":
- |-
  com.trendyol:stove-couchbase
"imports":
- |-
  com.trendyol.stove.couchbase.*
"configure": |-
  couchbase {
    CouchbaseSystemOptions(
      bucketName = "testbucket",
      configureExposedConfiguration = { cfg ->
        listOf(
          "couchbase.hosts=${cfg.hostsWithPort}",
          "couchbase.username=${cfg.username}",
          "couchbase.password=${cfg.password}"
        )
      }
    )
  }
"testDsl": |-
  couchbase {
    shouldGet<MyDoc>("doc-id") {
      it.field shouldBe "value"
    }
  }
"configureProvided": |-
  couchbase {
    CouchbaseSystemOptions.provided(
      bucketName = "myapp",
      hostsWithPort = "staging-couchbase:8091",
      username = System.getenv("CB_USER"),
      password = System.getenv("CB_PASS"),
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
