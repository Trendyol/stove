"label": |-
  MSSQL
"family": |-
  database
"gradle":
- |-
  com.trendyol:stove-mssql
"imports":
- |-
  com.trendyol.stove.mssql.*
"configure": |-
  mssql {
    MsSqlOptions(
      configureExposedConfiguration = { cfg ->
        listOf("spring.datasource.url=${cfg.jdbcUrl}")
      }
    )
  }
"testDsl": |-
  mssql { shouldExecute("SELECT 1") }
"configureProvided": |-
  mssql {
    MsSqlOptions.provided(
      jdbcUrl = "jdbc:sqlserver://staging-mssql:1433;databaseName=myapp",
      username = System.getenv("MSSQL_USER"),
      password = System.getenv("MSSQL_PASS"),
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
