"label": |-
  MySQL
"family": |-
  database
"gradle":
- |-
  com.trendyol:stove-mysql
"imports":
- |-
  com.trendyol.stove.mysql.*
"configure": |-
  mysql {
    MySqlOptions(
      configureExposedConfiguration = { cfg ->
        listOf("spring.datasource.url=${cfg.jdbcUrl}")
      }
    )
  }
"testDsl": |-
  mysql { shouldExecute("SELECT 1") }
"configureProvided": |-
  mysql {
    MySqlOptions.provided(
      jdbcUrl = "jdbc:mysql://staging-mysql:3306/myapp?allowPublicKeyRetrieval=true&useSSL=false",
      username = System.getenv("MYSQL_USER"),
      password = System.getenv("MYSQL_PASS"),
      configureExposedConfiguration = { cfg -> emptyList() }
    )
  }
