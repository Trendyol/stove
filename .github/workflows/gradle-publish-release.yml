name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'Trendyol/stove'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: current

      - name: Extract version from gradle.properties
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "JRELEASER_PROJECT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"

      - name: Publish to Maven Central
        run: gradle --no-configuration-cache publish
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.gpg_private_key }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.gpg_passphrase }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ossrh_username }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ossrh_pass }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.BOT_REPO_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ env.JRELEASER_PROJECT_VERSION }}

      - name: Tag Go stove-kafka module
        run: |
          set -euo pipefail
          version="${{ env.JRELEASER_PROJECT_VERSION }}"
          module_dir="go/stove-kafka"
          # Tag format for a module in a subdirectory is "<subdir>/vX.Y.Z" for every
          # major version — the prefix is the directory, not the module path.
          tag="${module_dir}/v${version}"

          # Go's major-version rule: from v2 onward the module path itself must carry a
          # "/vN" suffix (github.com/.../stove-kafka/v2). If the released major version is
          # >= 2 but go.mod does not declare the matching suffix, the tag would resolve to
          # an unbuildable module — fail loudly instead of publishing a broken tag.
          major="${version%%.*}"
          module_path="$(awk '/^module /{print $2; exit}' "${module_dir}/go.mod")"
          if [ "${major}" -ge 2 ]; then
            case "${module_path}" in
              */v"${major}") : ;;
              *)
                echo "::error::Releasing v${version} but ${module_dir}/go.mod declares '${module_path}'." \
                     "For major version ${major}, the module path must end with '/v${major}'." \
                     "Update the module path and importers before tagging."
                exit 1
                ;;
            esac
          fi

          git tag "${tag}"
          git push origin "${tag}"
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_REPO_TOKEN }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
