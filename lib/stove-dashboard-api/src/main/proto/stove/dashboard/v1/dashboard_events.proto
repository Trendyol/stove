syntax = "proto3";
package stove.dashboard.v1;

option java_package = "com.trendyol.stove.dashboard.api";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message DashboardEvent {
  string run_id = 1;
  oneof event {
    RunStartedEvent run_started = 10;
    RunEndedEvent run_ended = 11;
    TestStartedEvent test_started = 12;
    TestEndedEvent test_ended = 13;
    EntryRecordedEvent entry_recorded = 14;
    SpanRecordedEvent span_recorded = 15;
    SnapshotEvent snapshot = 16;
    MockInteractionEvent mock_interaction = 17;
  }
}

message RunStartedEvent {
  google.protobuf.Timestamp timestamp = 1;
  string app_name = 2;
  repeated string systems = 3;
  string stove_version = 4;
}

message RunEndedEvent {
  google.protobuf.Timestamp timestamp = 1;
  int32 total_tests = 2;
  int32 passed = 3;
  int32 failed = 4;
  int64 duration_ms = 5;
}

message TestStartedEvent {
  string test_id = 1;
  string test_name = 2;
  string spec_name = 3;
  google.protobuf.Timestamp timestamp = 4;
  repeated string test_path = 5;
}

message TestEndedEvent {
  string test_id = 1;
  string status = 2;
  int64 duration_ms = 3;
  string error = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message EntryRecordedEvent {
  string test_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string system = 3;
  string action = 4;
  string result = 5;
  string input = 6;
  string output = 7;
  map<string, string> metadata = 8;
  string expected = 9;
  string actual = 10;
  string error = 11;
  string trace_id = 12;
}

message SpanRecordedEvent {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string operation_name = 4;
  string service_name = 5;
  int64 start_time_nanos = 6;
  int64 end_time_nanos = 7;
  string status = 8;
  map<string, string> attributes = 9;
  ExceptionInfo exception = 10;
}

message ExceptionInfo {
  string type = 1;
  string message = 2;
  repeated string stack_trace = 3;
}

message SnapshotEvent {
  string test_id = 1;
  string system = 2;
  string state_json = 3;
  string summary = 4;
}

// One completed exchange observed by a mock system (WireMock / gRPC Mock) — the data
// behind the network-tab/swimlane view. Emitted for every request that reaches a mock,
// matched or not. Attribution is proven-only: an exchange is either provably owned by a
// test or explicitly UNATTRIBUTED; consumers must never infer ownership.
message MockInteractionEvent {
  // Empty when attribution is UNATTRIBUTED; render in the run-level lane.
  string test_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string system = 3;
  string protocol = 4; // HTTP | GRPC
  string method = 5;   // HTTP verb; empty for gRPC (target carries the method)
  string target = 6;   // URL for HTTP; service/Method for gRPC
  bool matched = 7;
  string stub_id = 8;
  MockInteractionAttribution attribution = 9;
  string request_body = 10;
  bool request_body_truncated = 11;
  string response_body = 12;
  bool response_body_truncated = 13;
  string status = 14;      // HTTP status code, fault name, or gRPC status code name
  int64 latency_ms = 15;   // -1 when the mock could not measure it
  repeated string near_misses = 16; // populated for unmatched exchanges
  string trace_id = 17;    // from traceparent, when the request carried one
}

enum MockInteractionAttribution {
  MOCK_INTERACTION_ATTRIBUTION_UNSPECIFIED = 0;
  PROVEN_HEADER = 1;
  PROVEN_BAGGAGE = 2;
  PROVEN_STUB = 3;
  UNATTRIBUTED = 4;
}

message EventAck {
  bool accepted = 1;
}
