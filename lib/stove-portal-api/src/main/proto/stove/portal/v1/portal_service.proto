syntax = "proto3";
package stove.portal.v1;

option java_package = "com.trendyol.stove.portal.api";
option java_multiple_files = true;

import "stove/portal/v1/portal_events.proto";

service PortalEventService {
  rpc StreamEvents(stream PortalEvent) returns (EventAck);
  rpc SendEvent(PortalEvent) returns (EventAck);
}
